<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Code Runner - Sazzad</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        #main-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1a73e8;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-update {
            background-color: #34a853;
            color: white;
        }

        .btn-update:hover {
            background-color: #2d8e47;
        }

        .btn-run {
            background-color: #1a73e8;
            color: white;
            margin-top: 10px;
        }

        .btn-run:hover {
            background-color: #1557b0;
        }

        #full-page-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
        }

        #back-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 10000;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        #back-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="container">
            <h2>অ্যাডমিন প্যানেল</h2>
            <textarea id="codeInput" placeholder="এখানে আপনার HTML কোড লিখুন..."></textarea>
            <button class="btn btn-update" onclick="updateCode()">Update Code to Database</button>
        </div>

        <div class="container">
            <h2>ইউজার সেকশন</h2>
            <button class="btn btn-run" onclick="runCode()">Run WebApp Full Page</button>
        </div>
    </div>

    <div id="full-page-viewer">
        <button id="back-btn" onclick="closeViewer()">← Back to Admin</button>
        <iframe id="outputFrame"></iframe>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLuhp6pB3MvAW3cnULNmACRUKrbVP05wE",
            authDomain: "app-76952.firebaseapp.com",
            projectId: "app-76952",
            storageBucket: "app-76952.firebasestorage.app",
            messagingSenderId: "369891930336",
            appId: "1:369891930336:web:c09fd75befbe7aa6c0e085",
            measurementId: "G-45CJVVW2XH"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function updateCode() {
            const code = document.getElementById('codeInput').value;
            if (!code) {
                alert("সাজ্জাদ, দয়া করে কিছু কোড লিখুন!");
                return;
            }

            database.ref('appData/currentCode').set(code)
                .then(() => {
                    alert("কোড সফলভাবে ডাটাবেসে আপডেট হয়েছে!");
                })
                .catch((error) => {
                    alert("এরর: " + error.message);
                });
        }

        function runCode() {
            const mainUI = document.getElementById('main-ui');
            const viewer = document.getElementById('full-page-viewer');
            const iframe = document.getElementById('outputFrame');

            database.ref('appData/currentCode').once('value')
                .then((snapshot) => {
                    const code = snapshot.val();
                    if (code) {
                        mainUI.style.display = 'none';
                        viewer.style.display = 'block';
                        
                        const doc = iframe.contentWindow.document;
                        doc.open();
                        doc.write(code);
                        doc.close();
                    } else {
                        alert("ডাটাবেসে কোনো কোড পাওয়া যায়নি!");
                    }
                })
                .catch((error) => {
                    alert("এরর: " + error.message);
                });
        }

        function closeViewer() {
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('full-page-viewer').style.display = 'none';
            document.getElementById('outputFrame').src = "about:blank";
        }
    </script>
</body>
</html>
