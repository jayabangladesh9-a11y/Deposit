<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Code Runner - Sazzad</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1a73e8;
        }

        .admin-panel {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-update {
            background-color: #34a853;
            color: white;
        }

        .btn-update:hover {
            background-color: #2d8e47;
        }

        .btn-run {
            background-color: #1a73e8;
            color: white;
            margin-top: 10px;
        }

        .btn-run:hover {
            background-color: #1557b0;
        }

        #output-container {
            width: 100%;
            height: 400px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            overflow: hidden;
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            textarea {
                height: 120px;
            }
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 1.2rem;
            }
            .btn {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container admin-panel">
        <h2>অ্যাডমিন প্যানেল</h2>
        <textarea id="codeInput" placeholder="এখানে আপনার HTML কোড লিখুন..."></textarea>
        <button class="btn btn-update" onclick="updateCode()">Update Code to Database</button>
    </div>

    <div class="container">
        <h2>ইউজার সেকশন</h2>
        <button class="btn btn-run" onclick="runCode()">Run WebApp</button>
        <div id="output-container">
            <iframe id="outputFrame"></iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLuhp6pB3MvAW3cnULNmACRUKrbVP05wE",
            authDomain: "app-76952.firebaseapp.com",
            projectId: "app-76952",
            storageBucket: "app-76952.firebasestorage.app",
            messagingSenderId: "369891930336",
            appId: "1:369891930336:web:c09fd75befbe7aa6c0e085",
            measurementId: "G-45CJVVW2XH"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function updateCode() {
            const code = document.getElementById('codeInput').value;
            if (!code) {
                alert("দয়া করে কিছু কোড লিখুন!");
                return;
            }

            database.ref('appData/currentCode').set(code)
                .then(() => {
                    alert("কোড সফলভাবে আপডেট হয়েছে সাজ্জাদ!");
                })
                .catch((error) => {
                    console.error("Error updating code: ", error);
                });
        }

        function runCode() {
            const outputContainer = document.getElementById('output-container');
            const iframe = document.getElementById('outputFrame');

            database.ref('appData/currentCode').once('value')
                .then((snapshot) => {
                    const code = snapshot.val();
                    if (code) {
                        outputContainer.style.display = 'block';
                        const doc = iframe.contentWindow.document;
                        doc.open();
                        doc.write(code);
                        doc.close();
                    } else {
                        alert("ডাটাবেসে কোনো কোড পাওয়া যায়নি!");
                    }
                })
                .catch((error) => {
                    console.error("Error fetching code: ", error);
                });
        }
    </script>
</body>
</html>
